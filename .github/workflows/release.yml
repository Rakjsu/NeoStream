# Multi-OS release pipeline: push a v*.*.* tag and this builds Windows
# (NSIS + portable), Linux (AppImage + deb) and macOS (dmg + zip), then
# attaches everything — including the latest*.yml auto-update feeds — to
# the GitHub release for that tag. Release notes are edited afterwards.
name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || (sleep 15 && npm ci) || (sleep 60 && npm ci)

      # --publish never: electron-builder only builds; the release step
      # below uploads. (With GH_TOKEN visible, builder would double-publish.)
      - name: Build application
        run: npm run build -- --publish never
        # TMDB: sem chave embutida — cada usuário configura a própria
        # em Configurações → APIs (a env VITE_TMDB_API_KEY é só fallback dev).
        env:
          # macOS: no signing identity in CI — skip signing instead of failing.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Custom installer (Windows only): Electron shell with the app's look
      # that runs the standard NSIS Setup silently. The Setup exe + latest.yml
      # stay attached — auto-update depends on them.
      - name: Build custom installer
        if: runner.os == 'Windows'
        run: node build/build-custom-installer.cjs

      # Guard the auto-update feed: latest*.yml must still match the artifacts
      # on disk after every build step (incl. the custom installer). Catches a
      # stale sha512 before it reaches users as a "checksum mismatch".
      - name: Verify auto-update feed
        run: node build/verify-update-feed.cjs

      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/*.exe
            release/*.exe.blockmap
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
            release/latest*.yml
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
