name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npx eslint src electron

      - name: Unit tests
        run: npx vitest run

      - name: Renderer + main build
        run: npx vite build
        env:
          # Builds without a real key still succeed; TMDB features are
          # exercised at runtime, not at build time.
          VITE_TMDB_API_KEY: ci-placeholder
