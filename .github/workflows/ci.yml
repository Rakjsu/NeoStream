name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npx eslint src electron

      - name: Unit tests
        run: npx vitest run

      - name: Renderer + main build
        run: npx vite build
        env:
          # Builds without a real key still succeed; TMDB features are
          # exercised at runtime, not at build time.
          VITE_TMDB_API_KEY: ci-placeholder

  # Separate job so the fast checks above are never blocked by app startup
  # times. Electron E2E needs no Playwright browser download — the suite
  # launches the Electron binary from node_modules directly.
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (renderer + main)
        run: npx vite build
        env:
          VITE_TMDB_API_KEY: ci-placeholder

      - name: E2E tests (Playwright + Electron)
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
