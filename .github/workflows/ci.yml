name: CI

on:
  pull_request:
  push:
    branches: [main]
  # Weekly run so a CVE disclosed against an unchanged dependency is caught
  # even without a PR (the audit step fails the build on HIGH+ runtime vulns).
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || (sleep 15 && npm ci) || (sleep 60 && npm ci)

      # Fail the build on HIGH+ vulnerabilities in PRODUCTION deps only, so a
      # new runtime CVE is caught early without dev-tooling advisories (vite/
      # esbuild dev-server file reads, etc.) blocking every PR.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Typecheck
        run: npx tsc -b

      - name: Lint
        run: npx eslint src electron

      - name: Unit tests
        run: npx vitest run

      - name: Renderer + main build
        run: npx vite build

      - name: Bundle guard (ffmpeg-static inline mata DVR/transcode)
        run: node scripts/check-bundle.mjs

  # Separate job so the fast checks above are never blocked by app startup
  # times. Electron E2E needs no Playwright browser download — the suite
  # launches the Electron binary from node_modules directly.
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci || (sleep 15 && npm ci) || (sleep 60 && npm ci)

      - name: Build app (renderer + main)
        run: npx vite build
        env:
          # Chave TMDB fake SO pro build de E2E: sem chave, todo teste que
          # adiciona playlist cai no redirect de onboarding (Configuracoes ->
          # APIs) e a saudacao do dashboard so aparece por um frame - flaky
          # que depende da velocidade do runner. O spec do onboarding continua
          # cobrindo o fluxo sem chave via neostream_tmdb_ignore_env.
          VITE_TMDB_API_KEY: e2e-dummy-key

      - name: Bundle guard
        run: node scripts/check-bundle.mjs

      - name: E2E tests (Playwright + Electron)
        run: npx playwright test

      - name: Upload app screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: app-screenshots
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
