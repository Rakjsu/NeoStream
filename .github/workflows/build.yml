# Full multi-OS packaging. PRs are covered by the lighter ci.yml
# (typecheck/lint/tests/build); this heavy matrix runs on main and on demand.
name: Build NeoStream

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        # electron-builder 26 requires Node >= 20 (ESM-only deps); 18 is EOL.
        node-version: [22.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci || (sleep 15 && npm ci) || (sleep 60 && npm ci)
      
      - name: Run lint
        run: npm run lint
      
      # --publish never: this workflow only produces artifacts. Without it,
      # electron-builder sees the publish config + CI env and demands GH_TOKEN.
      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win -- --publish never

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac -- --publish never

      - name: Build Electron app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npm run build:linux -- --publish never
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: neostream-${{ matrix.os }}
          path: |
            release/**/*.exe
            release/**/*.dmg
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.yml
          retention-days: 7
